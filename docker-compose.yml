version: '3.8'

services:
  # OODA Agent 主服务
  ooda-agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: ooda-agent
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATA_DIR=/app/data
      # LLM 配置（请根据实际情况修改）
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
      # - KIMI_API_KEY=${KIMI_API_KEY}
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ooda-network

  # Nginx 反向代理（可选，用于生产环境）
  nginx:
    image: nginx:alpine
    container_name: ooda-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./packages/app/dist:/usr/share/nginx/html:ro
    depends_on:
      - ooda-agent
    restart: unless-stopped
    networks:
      - ooda-network
    profiles:
      - production

  # Ollama 服务（可选，用于本地模型）
  ollama:
    image: ollama/ollama:latest
    container_name: ooda-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    networks:
      - ooda-network
    profiles:
      - ollama

volumes:
  ollama-data:

networks:
  ooda-network:
    driver: bridge
